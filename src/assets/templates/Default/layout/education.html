<div class="item">
    <div class="item-row">
        <h2>{{ block.degree }}</h2>
        <span>{{ block.institution }}</span>
    </div>
    <div class="item-row">
        <span>{{ block.field_of_study }}</span>
        <span>{{ block.date }}</span>
    </div>
    {% if block.description %}
    <p>{{ block.description }}</p>
    {% endif %}
</div>
