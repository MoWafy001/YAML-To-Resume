<div class="item">
    <div class="item-row">
        <h2>{{ block.job_title }}</h2>
        <span>{{ block.company }}</span>
    </div>
    <div class="item-row">
        <span>{{ block.location }}</span>
        <span>{{ block.date_range }}</span>
    </div>
    {% if block.description is string %}
    <p>{{ block.description }}</p>
    {% else %}
    <ul>
        {% for line in block.description %}
        <li>{{ line }}</li>
        {% endfor %}
    </ul>
    {% endif %}
</div>
